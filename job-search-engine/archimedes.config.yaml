  positioningGuidance: >
    Frame the career not as a lack of focus, but as a consistent pattern
    of being deployed into complex, high-trust situations where precision,
    discretion, and execution matter. The EeroQ role is the clearest
    Chief of Staff proof point — promoted from outside counsel to executive
    CoS, ran everything from $10M+ in financing to IP licensing to office
    buildout. Trace Machina shows the same pattern at a different stage:
    sole director, 10x ARR, 7x legal cost reduction, SOC II. AGS Law
    shows the ability to build and run your own thing. Do not overstate
    hands-on software engineering experience — technical credibility is
    real (MCP, AI tooling, developer infrastructure literacy), but the
    strongest positioning is as a sophisticated operator with strong
    AI/developer-tools literacy, not as a traditional engineer.

    The Rhodes Scholar credential is structural, not decorative. It is not
    interchangeable with Yale Law as a prestige signal — it is a different
    category of claim entirely. The Rhodes selection process is specifically
    designed to identify people expected to be consequential in their domains,
    evaluated at 21 or 22 by committees of senior people whose job is exactly
    that judgment. A hiring committee that understands the credential reads it
    as: "identified by a selection process designed to find people of judgment
    and consequence, and is now here demonstrating the full arc." This changes
    the starting position of every conversation at institutions that understand
    it — foundations, policy organizations, frontier AI labs, senior roles in
    government, law firm general counsel, media companies with intellectual
    cultures. The Rhodes pre-licenses the evaluator register. An opening
    that diagnoses the company's problem does not read as presumptuous for
    this profile; it reads as calibrated. Content generators should default
    to the evaluator voice rather than softening toward applicant hedging.

    The DPhil in Experimental Psychology is the research credential — distinct
    from the Rhodes. It is real doctoral empirical work across three peer-reviewed
    publications with named collaborators (John T. Jost at NYU, William H. Dutton
    at Oxford Internet Institute). The Rhodes got to Oxford; the DPhil is what
    happened there. Both count and they count for different reasons.

